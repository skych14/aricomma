app = "ari-shuimpyo-demo"
primary_region = "nrt"

[build]
  dockerfile = "Dockerfile"

[env]
  DATABASE_URL = "sqlite:////data/ari_project.db"
  UPLOAD_DIR   = "/data/uploads"
  # CORS_ORIGINS는 fly secrets set으로 관리 (현재값: https://ari-shuimpyo-demo.pages.dev,http://localhost:5173)

[http_service]
  internal_port        = 8000
  force_https          = true
  auto_stop_machines   = true
  auto_start_machines  = true
  min_machines_running = 0

  [http_service.concurrency]
    type       = "connections"
    hard_limit = 25
    soft_limit = 20

  [[http_service.checks]]
    grace_period = "10s"
    interval     = "30s"
    method       = "GET"
    path         = "/health"
    timeout      = "5s"

[[vm]]
  memory   = "256mb"
  cpu_kind = "shared"
  cpus     = 1

[[mounts]]
  source      = "ari_data"
  destination = "/data"
